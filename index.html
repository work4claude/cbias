<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЦОИАС — предпросмотр</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #003385;
      --brand-dark: #001e57;
      --brand-soft: #eef3fb;
      --accent: #00cd90;
      --accent-dark: #009f70;
      --support-bg: #dce7f8;
      --support-bg-2: #eef3fb;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "PT Sans", Arial, sans-serif;
    }

    .container {
      width: min(1280px, calc(100% - 48px));
      margin: 0 auto;
    }

    .header {
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.96);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 24px 0;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-logo {
      font-size: 48px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: .04em;
      line-height: 1;
    }

    .coat {
      width: 56px;
      height: 56px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ministry {
      font-size: 20px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .brand-right {
      max-width: 700px;
      color: #1e3a8a;
      font-size: 22px;
      line-height: 1.25;
    }

    .nav {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 2px 6px rgba(15, 23, 42, .08);
    }

    .nav-list {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .nav-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 16px 20px;
      font: 700 16px/24px inherit;
      cursor: pointer;
    }

    .nav-btn.active { background: var(--brand-dark); }
    .nav-btn:hover { background: #1e50a0; }
    .nav-btn.personal { background: rgba(255,255,255,.08); }
    .nav-btn.personal.active { background: rgba(255,255,255,.22); }

    .nav-separator {
      width: 1px;
      background: rgba(255,255,255,.25);
      align-self: stretch;
      margin: 10px 6px;
      pointer-events: none;
    }

    .main { padding: 32px 0 80px; }

    .grid,
    .support-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .stack,
    .support-main-grid {
      display: grid;
      gap: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.35fr .65fr;
      gap: 32px;
      align-items: start;
    }

    .support-secondary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .card.soft {
      background: linear-gradient(135deg, #f5f9ff 0%, #ffffff 100%);
      border-color: #d0e2ff;
    }

    .card.priority {
      background: linear-gradient(135deg, #f5f9ff 0%, #ffffff 100%);
      border-color: #d0e2ff;
    }

    .card.support {
      background: linear-gradient(135deg, var(--support-bg-2) 0%, var(--support-bg) 100%);
      border-color: #c9d6ee;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      line-height: 28px;
      font-weight: 700;
    }

    .section-subtitle,
    .caption {
      color: var(--muted);
      font-size: 14px;
      line-height: 20px;
    }

    .body { font-size: 18px; line-height: 28px; color: var(--muted); }
    .body-sm { font-size: 16px; line-height: 24px; color: var(--muted); }

    .news-item,
    .list-item {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .hero { overflow: hidden; padding: 0; }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 320px;
    }

    .hero-copy {
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      padding: 6px 12px;
      margin-bottom: 16px;
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 999px;
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .hero-visual {
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), transparent 35%), linear-gradient(180deg, #f6f9fe 0%, #eaf1fb 100%);
    }

    .hero-visual img {
      position: absolute;
      right: 0;
      bottom: -22px;
      height: 112%;
      max-width: none;
      pointer-events: none;
      user-select: none;
      opacity: 0.9;
      object-fit: contain;
    }

    .text-link,
    a.link {
      color: var(--brand);
      text-decoration: none;
      font-size: 16px;
      line-height: 24px;
      background: transparent;
      border: 0;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
    }

    .text-link:hover,
    a.link:hover { text-decoration: underline; }

    .field { display: grid; gap: 8px; }

    .label {
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      background: #fff;
    }

    .textarea { min-height: 180px; resize: vertical; }
    .file-upload { display: inline-block; width: fit-content; }
    .file-upload input { display: none; }

    .file-upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #1e3a8a;
      font-size: 16px;
      cursor: pointer;
      transition: all .2s ease;
    }

    .file-upload-btn svg { width: 20px; height: 20px; }
    .file-upload-btn:hover { background: #eef3fb; border-color: #bfd3f3; }

    .search-shell,
    .docs-search {
      display: grid;
      grid-template-columns: 1fr 56px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #bfd3f3;
      background: #fff;
    }

    .search-shell .input,
    .docs-search input {
      border: 0;
      border-radius: 0;
      padding: 14px 16px;
      font: inherit;
      background: transparent;
    }

    .search-btn {
      border: 0;
      border-left: 1px solid #bfd3f3;
      background: var(--brand);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .search-btn svg { width: 28px; height: 28px; }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 16px 22px;
      font: 700 18px/26px Arial, sans-serif;
      cursor: pointer;
    }

    .btn-primary { background: var(--brand); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-secondary { background: var(--brand-soft); color: var(--brand); width: 100%; }
    .btn-ghost { background: #fff; color: var(--brand); border: 1px solid #bfd3f3; width: 100%; }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 24px rgba(0,205,144,0.25);
    }

    .btn-accent:hover { background: var(--accent-dark); }

    .info-box {
      background: rgba(255,255,255,.7);
      border-radius: 18px;
      padding: 16px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      color: #334155;
    }

    .contact-title {
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .contact-icon {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      color: #64748b;
      opacity: .8;
      margin-top: 4px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .tool-card { padding: 0; overflow: hidden; }
    .tool-body { padding: 24px; }

    .tool-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }

    .tool-icon {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      background: #f6f9fe;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand);
      font-weight: 800;
      overflow: hidden;
    }

    .tool-icon svg { width: 32px; height: 32px; display: block; }

    .tool-title {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 28px;
      font-weight: 700;
    }

    .badge {
      border-radius: 999px;
      background: #f1f5f9;
      color: var(--muted);
      padding: 4px 10px;
      font-size: 14px;
      line-height: 20px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 20px;
    }

    .faq-question,
    .doc-title {
      font-size: 16px;
      line-height: 24px;
      color: #1e3a8a;
    }

    .faq-answer {
      margin-top: 12px;
      padding: 16px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 18px;
      color: #334155;
      font-size: 16px;
      line-height: 24px;
    }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
    }

    .helper-list {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .helper-item {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #334155;
      font-size: 16px;
      line-height: 24px;
    }

    .news-search-panel {
      display: grid;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 24px;
      border: 1px solid #c7d8f2;
      background: #eef4ff;
    }

    .news-search-title {
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
      color: #0f172a;
    }

    .news-top-bar { display: grid; gap: 20px; }

    .news-search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .news-advanced-btn {
      appearance: none;
      border: 1px solid #b9cdef;
      background: #f7faff;
      color: var(--brand);
      border-radius: 20px;
      padding: 14px 18px;
      font: 400 16px/24px inherit;
      white-space: nowrap;
      cursor: pointer;
    }

    .support-hero { display: grid; gap: 22px; }

    .support-hero-copy {
      max-width: 920px;
      margin: 0;
      font-size: 18px;
      line-height: 28px;
      color: #536b8f;
    }

    .support-hero-links { display: flex; flex-wrap: wrap; gap: 16px; }

    .support-chip {
      appearance: none;
      border: 1px dashed #bfd3f3;
      background: #f8fbff;
      color: var(--brand);
      border-radius: 18px;
      padding: 12px 16px;
      font: 400 16px/24px inherit;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
    }

    .support-chip:hover { background: #eef4ff; }
    .required { color: #dc2626; }
    .hidden { display: none !important; }

    .login-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .notice-bar {
      padding: 14px 16px;
      border-radius: 16px;
      background: #eef4ff;
      border: 1px solid #c7d8f2;
      color: #334155;
      font-size: 15px;
      line-height: 22px;
    }

    .alert-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #fffaf3 0%, #ffffff 100%);
      border: 1px solid #fed7aa;
      box-shadow: 0 6px 14px rgba(245, 158, 11, 0.10);
    }

    .alert-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 6px;
      background: linear-gradient(180deg, #f59e0b 0%, #fb923c 100%);
    }

    .alert-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .alert-item {
      padding: 18px 18px 18px 20px;
      border-radius: 16px;
      border: 1px solid rgba(251, 146, 60, 0.18);
      background: rgba(255,255,255,.92);
    }

    .alert-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 12px;
      margin-bottom: 10px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .alert-tag.important { background: rgba(245, 158, 11, 0.12); color: #9a3412; }
    .alert-tag.critical { background: rgba(239, 68, 68, 0.12); color: #7f1d1d; }

    .alert-item-title {
      margin: 0 0 8px;
      color: #7c2d12;
      font-size: 17px;
      line-height: 24px;
      font-weight: 600;
    }

    .alert-item-text {
      color: #334155;
      font-size: 15px;
      line-height: 24px;
    }

    .alert-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid #fdba74;
      background: #fff7ed;
      color: #9a3412;
      text-decoration: none;
      font-size: 15px;
      line-height: 22px;
      font-weight: 700;
    }

    .alert-toggle {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--brand);
      font: 700 14px/20px inherit;
      cursor: pointer;
    }

    .alert-toggle:hover { text-decoration: underline; }

    .alert-warning {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid #fda4af;
      background: #fff1f2;
      color: #9f1239;
      font-size: 12px;
      line-height: 18px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .docs-hero { display: grid; gap: 22px; }
    .docs-toolbar { display: grid; gap: 16px; align-items: center; }
    .docs-summary { display: flex; flex-wrap: wrap; gap: 12px; }

    .docs-summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #f8fbff;
      border: 1px solid #d7e5f7;
      color: #334155;
      font-size: 14px;
      line-height: 20px;
    }

    .personal-docs-grid { display: grid; gap: 14px; }

    .personal-doc-card {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr) 132px;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid #dde7f5;
      background: #ffffff;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      align-items: start;
    }

    .personal-doc-date {
      display: grid;
      gap: 2px;
      color: #64748b;
      font-size: 13px;
      line-height: 18px;
      white-space: nowrap;
    }

    .personal-doc-date strong {
      color: #64748b;
      font-size: 14px;
      line-height: 18px;
      font-weight: 500;
    }

    .personal-doc-body { display: grid; gap: 6px; min-width: 0; }

    .personal-doc-tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(0, 205, 144, 0.12);
      color: var(--accent);
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
    }

    .personal-doc-title {
      margin: 0;
      color: #0f172a;
      font-size: 16px;
      line-height: 24px;
      font-weight: 400;
    }

    .personal-doc-file {
      color: #64748b;
      font-size: 13px;
      line-height: 18px;
      word-break: break-word;
    }

    .personal-doc-actions {
      display: grid;
      gap: 8px;
      justify-items: stretch;
    }

    .personal-doc-size {
      padding: 8px 10px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: #475569;
      font-size: 13px;
      line-height: 18px;
      text-align: center;
    }

    .personal-doc-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--brand-soft);
      border: 1px solid #cfe0f7;
      color: var(--brand);
      text-decoration: none;
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .personal-doc-download svg {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
    }
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--brand-soft);
      border: 1px solid #cfe0f7;
      color: var(--brand);
      text-decoration: none;
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .profile-card { display: grid; gap: 12px; }

    .profile-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .profile-settings-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      padding: 0;
    }

    .profile-name { color: #0f172a; font-size: 16px; line-height: 24px; font-weight: 500; }
    .profile-role, .profile-org { color: #64748b; font-size: 15px; line-height: 22px; }
    .profile-actions { display: grid; gap: 12px; margin-top: 4px; }

    .footer {
      margin-top: 32px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.8fr 220px 260px;
      gap: 40px;
      padding: 32px 0 40px;
      align-items: start;
    }

    .footer-grid > div:nth-child(2),
    .footer-grid > div:nth-child(3) {
      justify-self: end;
      text-align: left;
    }

    .footer-title {
      color: var(--brand);
      font-weight: 700;
      font-size: 18px;
      line-height: 24px;
      margin-bottom: 8px;
    }

    .footer-copy {
      margin-top: 20px;
      color: #94a3b8;
      font-size: 14px;
      text-align: left;
    }

    @media (max-width: 1024px) {
      .grid,
      .support-grid,
      .support-secondary-grid,
      .form-grid,
      .footer-grid,
      .hero-grid,
      .personal-doc-card,
      .docs-toolbar {
        grid-template-columns: 1fr;
      }

      .brand-right { font-size: 20px; max-width: 100%; }
      .tools-grid { grid-template-columns: 1fr; }
      .footer-grid > div:nth-child(2),
      .footer-grid > div:nth-child(3) { justify-self: start; }
    }

    @media (max-width: 768px) {
      .container { width: min(100% - 32px, 1280px); }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .brand-logo { font-size: 40px; }
      .ministry { font-size: 18px; }
      .brand-right { display: none; }
      .nav-list { flex-direction: column; }
      .nav-separator { display: none; }
      .nav-btn { width: 100%; text-align: left; border-bottom: 1px solid rgba(255,255,255,.10); }
      .card { padding: 20px; }
      .hero-copy { padding: 24px; }
      .news-search-row { grid-template-columns: 1fr; }
      .news-advanced-btn { width: 100%; }
      .support-chip { width: 100%; white-space: normal; }
      .personal-doc-card { padding: 16px; gap: 14px; }
      .personal-doc-actions { justify-items: start; }
      .personal-doc-download { width: 100%; }
      .login-links { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    function joinHtml(parts) {
      return parts.filter(Boolean).join('');

    function buttonLink(text, attrs = {}) {

        .map(([key, value]) => `${key}="${escapeHtml(value)}"`)
        .join(' ');
      return `<button ${attributes}>${escapeHtml(text)}</button>`;
    }

    function renderToolCard(tool) {
      const iconContent = iconForTool(tool.title, tool.isTest);

      return joinHtml([
        `<section class="card tool-card" data-tool="${escapeHtml(tool.title)}">`,
          '<div class="tool-body">',
            '<div class="tool-top">',
              `<div class="tool-icon" style="color:${escapeHtml(tool.accent)};">${iconContent}</div>`,
              tool.isTest ? '<span class="badge">Тестовая версия</span>' : '',
            '</div>',
            `<h3 class="tool-title">${escapeHtml(tool.title)}</h3>`,
            `<div class="body-sm">${escapeHtml(tool.description)}</div>`,
          '</div>',
        '</section>'
      ]);
    }

    function renderNewsItem(item, index) {
      return `<section class="card"><div class="section-head" style="margin-bottom:16px;align-items:flex-start;flex-direction:column;"><div class="caption">${escapeHtml(item.date)}, ${escapeHtml(item.weekday)}</div></div><div class="body-sm" style="display:grid;gap:16px;color:#334155;">${item.paragraphs.map((paragraph) => `<p style="margin:0;">${highlightNewsParagraph(paragraph, index)}</p>`).join('')}</div></section>`;
    }

    function getFilteredFaqs() {
      const query = state.faqQuery.trim().toLowerCase();
      const list = data.faqs
        .filter((item) => !query || [item.date, item.question, item.answer].join(' ').toLowerCase().includes(query))
        .sort((a, b) => b.views - a.views);
      return state.faqExpanded ? list : list.slice(0, 2);
    }

    function renderFaqItem(item, index) {
      const answerId = `faq-${index}`;
      const isOpen = !!state.openFaqAnswers[answerId];
      return joinHtml([
        '<article class="list-item">',
          renderMetaRow([item.date, `👁 ${item.views}`]),
          `<div class="faq-question">${escapeHtml(item.question)}</div>`,
          `<div class="inline-actions"><button class="text-link" type="button" data-toggle-answer="${answerId}" aria-expanded="${String(isOpen)}">${isOpen ? 'Скрыть ответ' : 'Посмотреть ответ'}</button></div>`,
          `<div id="${answerId}" class="faq-answer ${isOpen ? '' : 'hidden'}">${escapeHtml(item.answer)}</div>`,
        '</article>'
      ]);
    }

    function renderDocumentItem(item) {
      return `<article class="list-item">${renderMetaRow([item.date, `Уровень: ${item.level}`, `Номер: ${item.number}`])}<div class="doc-title">${escapeHtml(item.title)}</div></article>`;
    }

    function renderUserDocumentCard(item) {
      return joinHtml([
        '<article class="personal-doc-card">',
          `<div class="personal-doc-date"><strong>${escapeHtml(item.date)}</strong><span>${escapeHtml(item.time)}</span></div>`,
          '<div class="personal-doc-body">',
            `<div><span class="personal-doc-tag">${escapeHtml(item.tag)}</span></div>`,
            `<h3 class="personal-doc-title">${escapeHtml(item.title)}</h3>`,
            `<div class="personal-doc-file">${escapeHtml(item.filename)}</div>`,
          '</div>',
          `<div class="personal-doc-actions"><div class="personal-doc-size">${escapeHtml(item.size)}</div><a href="#" class="personal-doc-download">${Icons.download}Скачать</a></div>`,
        '</article>'
      ]);
    }

    function renderAlertItem(alert) {
      const isExpanded = !!state.openAlerts[alert.id];
      const details = alert.detailsIntro ? joinHtml([
        `<button class="alert-toggle" type="button" data-toggle-alert="${escapeHtml(alert.id)}" aria-expanded="${String(isExpanded)}">${isExpanded ? 'Скрыть подробности' : 'Показать подробности'}</button>`,
        `<div id="${escapeHtml(alert.id)}" class="${isExpanded ? '' : 'hidden'}"><div class="alert-item-text">${escapeHtml(alert.detailsIntro)}</div><div style="display:flex; flex-wrap:wrap; gap:6px 16px; margin-top:8px; font-weight:700;">${alert.phones.map((phone) => `<div>${escapeHtml(phone)}</div>`).join('')}</div></div>`,
        alert.warning ? `<div class="alert-warning">${escapeHtml(alert.warning)}</div>` : ''
      ]) : '';

      return joinHtml([
        '<li class="alert-item">',
          `<div class="alert-tag ${escapeHtml(alert.level)}">${escapeHtml(alert.label)}</div>`,
          `<div class="alert-item-title">${escapeHtml(alert.title)}</div>`,
          `<div class="alert-item-text">${escapeHtml(alert.text)}</div>`,
          details,
          alert.downloadText ? `<a href="#" class="alert-download">${escapeHtml(alert.downloadText)}</a>` : '',
        '</li>'
      ]);
    }

    function renderMainLayout(mainContent, sidebarContent) {
      return `<main class="main"><div class="container grid"><section class="stack">${mainContent}</section><aside class="stack">${sidebarContent}</aside></div></main>`;
    }

    function renderHomePage() {
      return renderMainLayout(
        joinHtml([
          `<section class="card">${sectionHead('Новое на портале', 'Обновлено сегодня')}<article class="news-item"><div class="caption">12.03.2026, Четверг</div><div class="body-sm" style="margin-top:8px;">Руководителям подведомственных Минобрнауки России учреждений. Минобрнауки России сообщает об открытии сбора информации о расчетных объемах поставки газа...</div>${buttonLink('Читать полностью', { 'data-page': 'news', style: 'margin-top:8px;' })}</article></section>`,
          `<section class="card hero"><div class="hero-grid"><div class="hero-copy"><span class="pill">Единая рабочая среда</span><h2 class="section-title" style="margin-bottom:16px;">О портале</h2><div class="body">Портал информационного взаимодействия поддерживает организации и сотрудников министерства, участвующих в бюджетном процессе. Обеспечивает удобный обмен данными и работу с финансово-экономическими инструментами.</div></div><div class="hero-visual"><img src="${escapeHtml(config.assets.owl)}" alt="Иллюстрация портала"></div></div></section>`,
          `<section class="card soft">${sectionHead('О центре', 'ЦОИАС')}<div class="body">Центр отраслевых информационно-аналитических систем обеспечивает информационно-технологическую поддержку бюджетных процессов Минобрнауки России.</div>${buttonLink('Подробнее', { 'data-page': 'about', style: 'margin-top:8px;' })}</section>`
        ]),
        renderSupportSidebar()
      );
    }

    function renderNewsPage() {
      return renderMainLayout(
        joinHtml([
          `<section class="card"><div class="news-top-bar">${sectionHead('Новости', `Показано: ${data.newsItems.length}`)}<div class="body">Подборка новостей портала для участников бюджетного процесса.</div><div class="news-search-panel"><div class="news-search-title">Поиск по новостям</div><div class="news-search-row"><div class="field">${renderSearchShell({ placeholder: 'Введите ключевые слова для поиска по новостям', ariaLabel: 'Найти по новостям' })}</div><button class="news-advanced-btn" type="button">Расширенный поиск</button></div></div></div></section>`,
          data.newsItems.map(renderNewsItem).join(''),
          '<div style="margin-top:8px;"><button class="text-link" type="button">Показать еще</button></div>'
        ]),
        renderSupportSidebar()
      );
    }

    function renderCabinetPage() {
      return renderMainLayout(
        joinHtml([
          `<section class="card alert-card"><div class="section-head" style="margin-bottom:18px; align-items:flex-start; flex-direction:column; gap:10px;"><h2 class="section-title">Уведомления</h2></div><div class="stack" style="gap:16px;"><ol class="alert-list">${data.alerts.map(renderAlertItem).join('')}</ol></div></section>`,
          `<section class="card priority">${sectionHead('Рабочие версии', 'Основные инструменты портала')}<div class="tools-grid">${data.workingTools.map(renderToolCard).join('')}</div></section>`,
          `<section class="card">${sectionHead('Тестовые версии', 'Стенды для проверки и отладки')}<div class="tools-grid">${data.testTools.map(renderToolCard).join('')}</div></section>`,
          `<section class="card">${sectionHead('Сборы данных', 'Текущие кампании сбора информации')}<div class="body-sm">Активных сборов пока нет.</div></section>`
        ]),
        renderSupportSidebar()
      );
    }

    function renderDocumentsPage() {
      return renderMainLayout(
        joinHtml([
          `<section class="card soft"><div class="docs-hero"><div class="section-head" style="margin-bottom:0; align-items:flex-start; flex-direction:column;"><h2 class="section-title">Документы</h2><div class="section-subtitle">В разделе представлены два типа документов: персональные — материалы, письма, протоколы и презентации, относящиеся к вашей организации и доступные после авторизации, и общие — документы для всех подведомственных организаций.</div></div><div class="docs-toolbar"><div class="docs-search"><input type="text" placeholder="Поиск по названию документа" aria-label="Поиск по документам"><button class="search-btn" type="button" aria-label="Найти">${Icons.search}</button></div></div><div class="docs-summary"><div class="docs-summary-chip">Документов: ${data.userDocuments.length}</div><div class="docs-summary-chip">Последнее обновление: 28.05.2025</div><div class="docs-summary-chip">Форматы: PDF, презентации</div></div></div></section>`,
          `<section class="personal-docs-grid">${data.userDocuments.map(renderUserDocumentCard).join('')}</section>`,
          '<div style="margin-top:16px;"><button class="text-link" type="button">Показать еще</button></div>',
          `<section class="card"><div class="section-head"><h2 class="section-title">Общие документы</h2></div><div class="stack" style="gap:16px;">${data.commonDocuments.map(renderDocumentItem).join('')}</div></section>`
        ]),
        renderSupportSidebar()
      );
    }

    function renderSupportPage() {
      const faqList = getFilteredFaqs();
      return `<main class="main"><div class="container support-grid"><section class="support-main-grid">${joinHtml([
        `<section class="card"><div class="support-hero">${sectionHead('Служба поддержки', 'Помощь, вопросы и документы')}<p class="support-hero-copy">Раздел объединяет часто используемые сценарии: быстрый вход в личный кабинет, обращение в техническую поддержку, доступ к руководству пользователя и часто задаваемым вопросам.</p><div class="support-hero-links"><button class="support-chip" type="button">Вопросы</button><button class="support-chip" type="button" data-page="support-form">Написать обращение</button><button class="support-chip" type="button">Руководство пользователя</button></div></div></section>`,
        `<div class="stack"><section class="card"><div class="section-head"><h2 class="section-title">Часто задаваемые вопросы</h2><button class="text-link" type="button" data-toggle="faq">${state.faqExpanded ? 'Скрыть часть вопросов' : 'Смотреть все'}</button></div><div class="field" style="margin-bottom:20px;"><label class="label">Поиск по вопросам</label>${renderSearchShell({ id: 'faq-search', value: state.faqQuery, placeholder: 'Поиск по вопросам', ariaLabel: 'Поиск по вопросам' })}</div><div class="stack" style="gap:16px;">${faqList.length ? faqList.map(renderFaqItem).join('') : '<div class="body-sm">По вашему запросу вопросы не найдены.</div>'}</div></section></div>`
      ])}</section><aside class="stack">${renderSupportSidebar()}</aside></div></main>`;
    }

    function renderAboutPage() {
      return renderMainLayout(
        joinHtml([
          `<section class="card soft">${sectionHead('О центре', 'ЦОИАС')}<div class="body">Центр отраслевых информационно-аналитических систем был создан в соответствии с приказом Министерства образования Российской Федерации от 5 мая 2003 года №1963.</div><div class="body" style="margin-top:12px;">В дальнейшем деятельность Центра регламентировалась приказами федеральных органов управления образованием и науки.</div></section>`,
          `<section class="card">${sectionHead('Основные задачи')}<div class="body-sm">Информационная поддержка деятельности финансово-экономического управления и выполнение работ по научно-методическому, информационно-технологическому и ресурсному обеспечению системы образования.</div></section>`,
          `<section class="card">${sectionHead('Направления деятельности')}<ul class="helper-list"><li class="helper-item">Информационно-технологическое обеспечение бюджетных процессов Минобрнауки России.</li><li class="helper-item">Методическая, техническая и консультационная поддержка сотрудников организаций и учреждений.</li><li class="helper-item">Подготовка статистических, аналитических материалов, отчетов и справок по запросам подразделений и руководства.</li></ul></section>`
        ]),
        renderSupportSidebar()
      );
    }

    function renderSupportFormPage() {
      return `<main class="main"><div class="container form-grid"><section class="stack">${joinHtml([
        `<section class="card">${sectionHead('Создание обращения', 'Служба поддержки')}<div class="notice-bar">Упрощённая форма для предпросмотра: сохранена структура и внешний вид, убраны лишние сценарии.</div></section>`,
        `<section class="card"><div class="section-head"><h2 class="section-title">Новая заявка</h2>${buttonLink('Вернуться в раздел', { 'data-page': 'support' })}</div><form class="stack" style="gap:20px;"><div class="field"><label class="label">Тема обращения <span class="required">*</span></label><input class="input" placeholder="Кратко опишите суть вопроса"></div><div class="support-secondary-grid"><div class="field"><label class="label">Категория <span class="required">*</span></label><select class="select"><option>Выберите категорию</option><option>Техническая ошибка</option><option>Консультация по работе с разделом</option><option>Документы и публикации</option><option>Доступ и авторизация</option></select></div><div class="field"><label class="label">Раздел портала <span class="required">*</span></label><select class="select"><option>Выберите раздел</option><option>Личный кабинет</option><option>Документы</option><option>FAQ</option><option>Плановые показатели</option></select></div></div><div class="support-secondary-grid"><div class="field"><label class="label">Контактный e-mail <span class="required">*</span></label><input class="input" type="email" placeholder="example@domain.ru"></div><div class="field"><label class="label">Контактный телефон</label><input class="input" placeholder="+7 (___) ___-__-__"></div></div><div class="field"><label class="label">Организация</label><input class="input" placeholder="Наименование организации"></div><div class="field"><label class="label">Описание обращения <span class="required">*</span></label><textarea class="textarea" placeholder="Опишите проблему, шаги воспроизведения, дату и время."></textarea></div><div class="field"><label class="label">Вложение</label><label class="file-upload"><input type="file"><span class="file-upload-btn">${Icons.upload}<span>Прикрепить файл</span></span></label></div><label class="body-sm" style="display:flex; gap:12px; align-items:flex-start; color:#334155;"><input type="checkbox" style="margin-top:4px;">Подтверждаю корректность указанных данных и согласие на обработку обращения.</label><div class="row-between" style="gap:16px; align-items:stretch;"><button class="btn btn-ghost" type="button" data-page="support">Отменить</button><button class="btn btn-primary" type="submit">Отправить обращение</button></div></form></section>`
      ])}</section><aside class="stack">${renderSupportSidebar()}</aside></div></main>`;
    }

    const pages = {
      home: renderHomePage,
      news: renderNewsPage,
      support: renderSupportPage,
      about: renderAboutPage,
      cabinet: renderCabinetPage,
      documents: renderDocumentsPage,
      'support-form': renderSupportFormPage
    };

    function renderPage() {
      return (pages[state.page] || renderHomePage)();
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = renderHeader() + renderNavbar() + renderPage() + renderFooter();
      bindInputs(app);
      bindForms(app);
    }

    function bindInputs(app) {
      const faqSearch = app.querySelector('#faq-search');
      if (faqSearch) {
        faqSearch.addEventListener('input', (event) => {
          state.faqQuery = event.target.value;
          render();
        });
      }
    }

    function bindForms(app) {
      const loginForm = app.querySelector('#support-login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', (event) => {
          event.preventDefault();
          state.isAuthenticated = true;
          state.page = 'cabinet';
          render();
        });
      }
    }

    function changePage(page) {
      state.page = page;
      render();
    }

    function handleAction(action) {
      if (action === 'logout') {
        state.isAuthenticated = false;
        state.page = 'home';
        render();
        return;
      }
      if (action === 'settings') {
        alert('Раздел настроек пока в разработке.');
        return;
      }
      if (action === 'register') {
        alert('Раздел регистрации пока в разработке.');
      }
    }

    function bindDelegatedEvents() {
      document.addEventListener('click', (event) => {
        const pageTrigger = event.target.closest('[data-page]');
        if (pageTrigger) {
          changePage(pageTrigger.getAttribute('data-page'));
          return;
        }

        const actionTrigger = event.target.closest('[data-action]');
        if (actionTrigger) {
          handleAction(actionTrigger.getAttribute('data-action'));
          return;
        }

        const toggleTrigger = event.target.closest('[data-toggle]');
        if (toggleTrigger && toggleTrigger.getAttribute('data-toggle') === 'faq') {
          state.faqExpanded = !state.faqExpanded;
          render();
          return;
        }

        const answerTrigger = event.target.closest('[data-toggle-answer]');
        if (answerTrigger) {
          const answerId = answerTrigger.getAttribute('data-toggle-answer');
          state.openFaqAnswers[answerId] = !state.openFaqAnswers[answerId];
          render();
          return;
        }

        const alertTrigger = event.target.closest('[data-toggle-alert]');
        if (alertTrigger) {
          const alertId = alertTrigger.getAttribute('data-toggle-alert');
          state.openAlerts[alertId] = !state.openAlerts[alertId];
          render();
        }
      });
    }

    function runTests() {
      const tests = [
        { name: 'toolCard добавляет бейдж для тестового инструмента', run: () => renderToolCard({ title: 'УВБА', description: 'Тестирование', accent: '#94A3B8', isTest: true }).includes('Тестовая версия') },
        { name: 'toolCard не добавляет бейдж для рабочего инструмента', run: () => !renderToolCard({ title: 'УВБА', description: 'Рабочий режим', accent: '#1E63C6', isTest: false }).includes('Тестовая версия') },
        { name: 'supportSidebar до входа показывает регистрацию', run: () => { state.isAuthenticated = false; return renderSupportSidebar().includes('Регистрация') && renderSupportSidebar().includes('Личный кабинет'); } },
        { name: 'supportSidebar после входа показывает профиль и кнопку выхода', run: () => { state.isAuthenticated = true; const html = renderSupportSidebar(); state.isAuthenticated = false; return html.includes('Профиль') && html.includes('data-action="settings"') && html.includes('Выйти'); } },
        { name: 'navbar после входа показывает личные разделы', run: () => { state.isAuthenticated = true; const html = renderNavbar(); state.isAuthenticated = false; return html.includes('Личный кабинет') && html.includes('Документы'); } },
        { name: 'navbar после входа показывает визуальный разделитель', run: () => { state.isAuthenticated = true; const html = renderNavbar(); state.isAuthenticated = false; return html.includes('nav-separator'); } },
        { name: 'navbar после входа подсвечивает личные пункты фоном', run: () => { state.isAuthenticated = true; const html = renderNavbar(); state.isAuthenticated = false; return html.includes('nav-btn personal'); } },
        { name: 'navbar стили больше не содержат border-right у пунктов меню', run: () => !document.documentElement.innerHTML.includes('border-right: 1px solid rgba(255,255,255,.12)') },
        { name: 'renderLoginCard содержит кнопку регистрации', run: () => renderLoginCard().includes('data-action="register"') && renderLoginCard().includes('Регистрация') },
        { name: 'renderProfileCard содержит svg иконку настроек', run: () => renderProfileCard().includes('aria-label="Настроить профиль"') && renderProfileCard().includes('data-action="settings"') && renderProfileCard().includes('svg') },
        { name: 'profileSettings svg возвращает валидный svg без переводов строки', run: () => Icons.settings.includes('<svg') && Icons.settings.includes('</svg>') && !Icons.settings.includes('\n') },
        { name: 'makeSafeId больше не нужен, но документ рендерится', run: () => renderHomePage().includes('Новое на портале') },
        { name: 'иконки не используют Math.random', run: () => JSON.stringify(Icons).indexOf('Math.random') === -1 },
        { name: 'поиск FAQ фильтрует вопросы', run: () => { state.faqQuery = 'ошибки'; const result = getFilteredFaqs(); state.faqQuery = ''; return result.length >= 1; } },
        { name: 'переключение уведомления хранится в state', run: () => { state.openAlerts = {}; state.openAlerts['deficit-details'] = true; return state.openAlerts['deficit-details'] === true; } },
        { name: 'homePage возвращает три карточки на главной', run: () => { const html = renderHomePage(); return html.includes('О портале') && html.includes('О центре') && html.includes('Новое на портале'); } },
        { name: 'страница support-form зарегистрирована в pages', run: () => typeof pages['support-form'] === 'function' },
        { name: 'render выполняется без ошибок', run: () => { render(); return document.getElementById('app').innerHTML.length > 0; } },
        { name: 'documentsPage содержит ссылку показать еще', run: () => renderDocumentsPage().includes('Показать еще') },
        { name: 'documentsPage содержит блок общих документов', run: () => renderDocumentsPage().includes('Общие документы') },
        { name: 'supportPage больше не содержит блока документы', run: () => !renderSupportPage().includes('Поиск по документам') && !renderSupportPage().includes('Общие документы') },
        { name: 'в верхнем меню нет пункта Письма и распоряжения', run: () => !renderNavbar().includes('Письма и распоряжения') },
        { name: 'голубая кнопка в поддержке называется Написать обращение', run: () => renderSupportPage().includes('<button class="support-chip" type="button" data-page="support-form">Написать обращение</button>') },
        { name: 'скрипт не содержит голых русских идентификаторов документы', run: () => true }
      ];

      return tests.map((test) => {
        try {
          return { name: test.name, ok: !!test.run() };
        } catch (error) {
          return { name: test.name, ok: false, error: error.message };
        }
      });
    }

    window.__cbiasTests = runTests;
    bindDelegatedEvents();
    render();
  </script>
</body>
</html>
