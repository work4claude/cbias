<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЦОИАС — предпросмотр</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #003385;
      --brand-dark: #001e57;
      --brand-soft: #eef3fb;
      --accent: #00cd90;
      --accent-dark: #009f70;
      --support-bg: #dce7f8;
      --support-bg-2: #eef3fb;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "PT Sans", Arial, sans-serif;
    }

    .container {
      width: min(1280px, calc(100% - 48px));
      margin: 0 auto;
    }

    .header {
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.96);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 24px 0;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-logo {
      font-size: 48px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: .04em;
      line-height: 1;
    }

    .coat {
      width: 56px;
      height: 56px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ministry {
      font-size: 20px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .brand-right {
      max-width: 700px;
      color: #1e3a8a;
      font-size: 22px;
      line-height: 1.25;
    }

    .nav {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 2px 6px rgba(15, 23, 42, .08);
    }

    .nav-list {
      display: flex;
      flex-wrap: wrap;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .nav-btn {
      appearance: none;
      border: 0;
      border-right: 1px solid rgba(255,255,255,.12);
      background: transparent;
      color: inherit;
      padding: 16px 20px;
      font: 700 16px/24px inherit;
      cursor: pointer;
    }

    .nav-btn.active { background: var(--brand-dark); }
    .nav-btn:hover { background: #1e50a0; }

    .main { padding: 32px 0 80px; }

    .grid,
    .support-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .stack,
    .support-main-grid {
      display: grid;
      gap: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.35fr .65fr;
      gap: 32px;
      align-items: start;
    }

    .support-secondary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .card.soft {
      background: linear-gradient(135deg, #f5f9ff 0%, #ffffff 100%);
      border-color: #d0e2ff;
    }

    .card.priority {
      background: linear-gradient(135deg, #f5f9ff 0%, #ffffff 100%);
      border: 1px solid #d0e2ff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .card.support {
      background: linear-gradient(135deg, var(--support-bg-2) 0%, var(--support-bg) 100%);
      border-color: #c9d6ee;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      line-height: 28px;
      font-weight: 700;
    }

    .section-subtitle,
    .caption {
      color: var(--muted);
      font-size: 14px;
      line-height: 20px;
    }

    .body { font-size: 18px; line-height: 28px; color: var(--muted); }
    .body-sm { font-size: 16px; line-height: 24px; color: var(--muted); }

    .news-item,
    .list-item {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .hero {
      overflow: hidden;
      padding: 0;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 320px;
    }

    .hero-copy {
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      padding: 6px 12px;
      margin-bottom: 16px;
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 999px;
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .hero-visual {
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), transparent 35%), linear-gradient(180deg, #f6f9fe 0%, #eaf1fb 100%);
    }

    .hero-visual img {
      position: absolute;
      right: 0;
      bottom: -22px;
      height: 112%;
      max-width: none;
      pointer-events: none;
      user-select: none;
      opacity: 0.9;
      object-fit: contain;
    }

    a.link,
    .text-link {
      color: var(--brand);
      text-decoration: none;
      font-size: 16px;
      line-height: 24px;
      background: transparent;
      border: 0;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
    }

    a.link:hover,
    .text-link:hover,
    .advanced-search-link:hover {
      text-decoration: underline;
    }

    .field { display: grid; gap: 8px; }

    .label {
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      background: #fff;
    }

    .textarea {
      min-height: 180px;
      resize: vertical;
    }

    .file-upload {
      display: inline-block;
      width: fit-content;
    }

    .file-upload input {
      display: none;
    }

    .file-upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #1e3a8a;
      font-size: 16px;
      cursor: pointer;
      transition: all .2s ease;
    }

    .file-upload-btn svg {
      width: 20px;
      height: 20px;
    }

    .file-upload-btn:hover {
      background: #eef3fb;
      border-color: #bfd3f3;
    }

    .search-shell {
      display: grid;
      grid-template-columns: 1fr 56px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #bfd3f3;
      background: #fff;
    }

    .search-shell .input {
      border: 0;
      border-radius: 0;
    }

    .search-btn {
      border-left: 1px solid #bfd3f3;
      background: var(--brand);
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
    }

    .search-btn svg {
      width: 28px;
      height: 28px;
    }

    .row-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 16px 22px;
      font: 700 18px/26px Arial, sans-serif;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover { background: var(--brand-dark); }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 24px rgba(0,205,144,0.25);
    }

    .btn-accent:hover { background: var(--accent-dark); }

    .btn-secondary {
      background: var(--brand-soft);
      color: var(--brand);
      width: 100%;
    }

    .btn-ghost {
      background: #fff;
      color: var(--brand);
      border: 1px solid #bfd3f3;
      width: 100%;
    }

    .info-box {
      background: rgba(255,255,255,.7);
      border-radius: 18px;
      padding: 16px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      color: #334155;
    }

    .contact-icon {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      color: #64748b;
      opacity: .8;
      margin-top: 4px;
    }

    .contact-title {
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .contact-lines {
      display: grid;
      gap: 2px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .tool-card {
      padding: 0;
      overflow: hidden;
    }

    .tool-body { padding: 24px; }

    .tool-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }

    .tool-icon {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      background: #f6f9fe;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .tool-icon svg {
      width: 32px;
      height: 32px;
      display: block;
      transform-origin: center;
    }

    .tool-card[data-tool="УВБА"] .tool-icon svg { transform: scale(0.96); }
    .tool-card[data-tool="Паспорта работ"] .tool-icon svg { transform: scale(0.94); }
    .tool-card[data-tool="Реестр"] .tool-icon svg { transform: scale(0.91); }
    .tool-card[data-tool="Форумы"] .tool-icon svg { transform: scale(0.93); }

    .tool-title {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 28px;
      font-weight: 700;
    }

    .badge {
      border-radius: 999px;
      background: #f1f5f9;
      color: var(--muted);
      padding: 4px 10px;
      font-size: 14px;
      line-height: 20px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 20px;
    }

    .faq-question,
    .doc-title {
      font-size: 16px;
      line-height: 24px;
      color: #1e3a8a;
    }

    .faq-answer {
      margin-top: 12px;
      padding: 16px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 18px;
      color: #334155;
      font-size: 16px;
      line-height: 24px;
    }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
    }

    .ghost-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px dashed #bfd3f3;
      background: #f8fbff;
      color: var(--brand);
      text-decoration: none;
      font-size: 16px;
      line-height: 24px;
    }

    .ghost-link:hover { background: #eef3fb; }

    .helper-list {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .helper-item {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #334155;
      font-size: 16px;
      line-height: 24px;
    }

    .news-search-panel {
      display: grid;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 24px;
      border: 1px solid #c7d8f2;
      background: #eef4ff;
    }

    .news-search-title {
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
      color: #0f172a;
    }

    .news-top-bar {
      display: grid;
      gap: 20px;
    }

    .news-search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .news-search-panel .search-shell {
      border-radius: 20px;
      border-color: #b9cdef;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
    }

    .news-search-panel .input {
      padding: 15px 16px;
      font-size: 16px;
    }

    .news-search-panel .search-btn {
      min-width: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .news-advanced-btn {
      appearance: none;
      border: 1px solid #b9cdef;
      background: #f7faff;
      color: var(--brand);
      border-radius: 20px;
      padding: 14px 18px;
      font: 400 16px/24px inherit;
      white-space: nowrap;
      cursor: pointer;
    }

    .news-advanced-btn:hover { background: #ffffff; }

    .support-hero {
      display: grid;
      gap: 22px;
    }

    .support-hero-copy {
      max-width: 920px;
      margin: 0;
      font-size: 18px;
      line-height: 28px;
      color: #536b8f;
    }

    .support-hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .support-chip {
      appearance: none;
      border: 1px dashed #bfd3f3;
      background: #f8fbff;
      color: var(--brand);
      border-radius: 18px;
      padding: 12px 16px;
      font: 400 16px/24px inherit;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
    }

    .support-chip:hover { background: #eef4ff; }

    .required { color: #dc2626; }
    .auth-note { margin-bottom: 12px; }
    .hidden { display: none !important; }

    .login-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .notice-bar {
      padding: 14px 16px;
      border-radius: 16px;
      background: #eef4ff;
      border: 1px solid #c7d8f2;
      color: #334155;
      font-size: 15px;
      line-height: 22px;
    }

    .alert-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #fffaf3 0%, #ffffff 100%);
      border: 1px solid #fed7aa;
      box-shadow: 0 6px 14px rgba(245, 158, 11, 0.10);
    }

    .alert-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 6px;
      background: linear-gradient(180deg, #f59e0b 0%, #fb923c 100%);
    }

    .alert-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 12px;
      margin-bottom: 10px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .alert-tag::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex: 0 0 8px;
    }

    .alert-tag.important {
      background: rgba(245, 158, 11, 0.12);
      color: #9a3412;
    }

    .alert-tag.important::before { background: #f59e0b; }

    .alert-tag.critical {
      background: rgba(239, 68, 68, 0.12);
      color: #7f1d1d;
    }

    .alert-tag.critical::before { background: #ef4444; }

    .alert-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .alert-item {
      padding: 18px 18px 18px 20px;
      border-radius: 16px;
      border: 1px solid rgba(251, 146, 60, 0.18);
      background: rgba(255,255,255,.92);
    }

    .alert-item-title {
      margin: 0 0 8px;
      color: #7c2d12;
      font-size: 17px;
      line-height: 24px;
      font-weight: 600;
    }

    .alert-item-text {
      color: #334155;
      font-size: 15px;
      line-height: 24px;
    }

    .alert-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid #fdba74;
      background: #fff7ed;
      color: #9a3412;
      text-decoration: none;
      font-size: 15px;
      line-height: 22px;
      font-weight: 700;
    }

    .alert-download:hover { background: #ffedd5; }

    .alert-phones {
      display: grid;
      gap: 4px;
      margin-top: 12px;
      color: #0f172a;
      font-weight: 700;
    }

    .alert-warning {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #fda4af;
      background: #fff1f2;
      color: #9f1239;
      font-size: 14px;
      line-height: 22px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .alert-collapsible {
      display: grid;
      gap: 10px;
    }

    .alert-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--brand);
      font: 700 14px/20px inherit;
      cursor: pointer;
    }

    .alert-toggle:hover { text-decoration: underline; }

    .alert-toggle::before {
      content: "▾";
      font-size: 14px;
      line-height: 1;
      transform-origin: center;
      transition: transform .2s ease;
    }

    .alert-toggle[aria-expanded="false"]::before { transform: rotate(-90deg); }
    .alert-collapsible-body.hidden { display: none !important; }

    .docs-hero {
      display: grid;
      gap: 22px;
    }

    .docs-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: center;
    }

    .docs-search {
      display: grid;
      grid-template-columns: 1fr 56px;
      border: 1px solid #cfe0f7;
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
    }

    .docs-search input {
      border: 0;
      padding: 15px 16px;
      font: inherit;
      background: transparent;
    }

    .docs-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .docs-summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #f8fbff;
      border: 1px solid #d7e5f7;
      color: #334155;
      font-size: 14px;
      line-height: 20px;
    }

    .personal-docs-grid {
      display: grid;
      gap: 14px;
    }

    .personal-doc-card {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr) 132px;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid #dde7f5;
      background: #ffffff;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      align-items: start;
    }

    .personal-doc-date {
      display: grid;
      gap: 2px;
      color: #64748b;
      font-size: 13px;
      line-height: 18px;
      white-space: nowrap;
    }

    .personal-doc-date strong {
      color: #64748b;
      font-size: 14px;
      line-height: 18px;
      font-weight: 500;
    }

    .personal-doc-body {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .personal-doc-top {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .personal-doc-tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(0, 205, 144, 0.12);
      color: var(--accent);
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
    }

    .personal-doc-title {
      margin: 0;
      color: #0f172a;
      font-size: 16px;
      line-height: 24px;
      font-weight: 400;
    }

    .personal-doc-file {
      color: #64748b;
      font-size: 13px;
      line-height: 18px;
      word-break: break-word;
    }

    .personal-doc-actions {
      display: grid;
      gap: 8px;
      justify-items: stretch;
    }

    .personal-doc-size {
      padding: 8px 10px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: #475569;
      font-size: 13px;
      line-height: 18px;
      text-align: center;
    }

    .personal-doc-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--brand-soft);
      border: 1px solid #cfe0f7;
      color: var(--brand);
      text-decoration: none;
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .personal-doc-download:hover { background: #e3eefc; }

    .personal-doc-download svg {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .profile-card {
      display: grid;
      gap: 12px;
    }

    function filterFaqItems() {
      const q = state.faqQuery.trim().toLowerCase();
      const list = faqs.filter(function(item) {
        return [item.date, String(item.views), item.question, item.answer].join(' ').toLowerCase().includes(q);
      }).sort(function(a, b) {
        return b.views - a.views;
      });
      return state.faqExpanded ? list : list.slice(0, 2);
    }

    function filterDocumentItems() {
      const q = state.docsQuery.trim().toLowerCase();
      const list = documents.filter(function(item) {
        return [item.date, item.level, item.number, item.title].join(' ').toLowerCase().includes(q);
      });
      return state.docsExpanded ? list : list.slice(0, 3);
    }

    function runTests() {
      const tests = [
        { name: 'toolCard добавляет бейдж для тестового инструмента', run: function() { return toolCard({ title: 'УВБА', description: 'Тестирование', accent: '#94A3B8', isTest: true }).includes('Тестовая версия'); } },
        { name: 'toolCard использует специальную иконку для тестового инструмента', run: function() { return toolCard({ title: 'УВБА', description: 'Тестирование', accent: '#94A3B8', isTest: true }).includes('testToolAccent-'); } },
        { name: 'toolCard не добавляет бейдж для рабочего инструмента', run: function() { return !toolCard({ title: 'УВБА', description: 'Рабочий режим', accent: '#1E63C6', isTest: false }).includes('Тестовая версия'); } },
        { name: 'supportSidebar до входа показывает регистрацию', run: function() { state.isAuthenticated = false; return supportSidebar(false).includes('Регистрация') && supportSidebar(false).includes('Личный кабинет'); } },
        { name: 'supportSidebar после входа показывает профиль и кнопку выхода', run: function() { state.isAuthenticated = true; const html = supportSidebar(false); state.isAuthenticated = false; return html.includes('Профиль') && html.includes('data-action="settings"') && html.includes('Выйти'); } },
        { name: 'supportSidebar содержит блок документов между авторизацией и поддержкой', run: function() { const html = supportSidebar(false); return html.indexOf('Личный кабинет') < html.indexOf('Документы') && html.indexOf('Документы') < html.indexOf('Служба поддержки'); } },
        { name: 'renderSidebarDocumentsCard содержит ссылку показать еще', run: function() { return renderSidebarDocumentsCard().includes('Показать еще'); } },
        { name: 'renderSidebarDocumentsCard содержит заголовок Документы', run: function() { return renderSidebarDocumentsCard().includes('Документы'); } },
        { name: 'renderSidebarDocumentsCard содержит тег Новое над текстом', run: function() { const html = renderSidebarDocumentsCard(); return html.includes('Новое') && html.indexOf('Новое') < html.indexOf('О предоставлении информации'); } },
        { name: 'renderSidebarDocumentsCard не использует sidebar-doc-link', run: function() { return !renderSidebarDocumentsCard().includes('sidebar-doc-link'); } },
        { name: 'navbar после входа показывает личные разделы', run: function() { state.isAuthenticated = true; const html = navbar(); state.isAuthenticated = false; return html.includes('Личный кабинет') && html.includes('Мои документы'); } },
        { name: 'documentsPage содержит ссылку показать еще', run: function() { return documentsPage().includes('Показать еще'); } },
        { name: 'renderLoginCard содержит кнопку регистрации', run: function() { return renderLoginCard().includes('data-action="register"') && renderLoginCard().includes('Регистрация'); } },
        { name: 'renderProfileCard содержит svg иконку настроек', run: function() { return renderProfileCard().includes('aria-label="Настроить профиль"') && renderProfileCard().includes('data-action="settings"') && renderProfileCard().includes('svg'); } },
        { name: 'profileSettingsIconSvg возвращает валидный svg без переводов строки в JS-строке', run: function() { const svg = profileSettingsIconSvg(); return svg.includes('<svg') && svg.includes('</svg>') && !svg.includes('\n'); } },
        { name: 'renderSidebarDocumentsCard не содержит синтаксического мусора от старой версии', run: function() { const html = renderSidebarDocumentsCard(); return !html.includes('sidebar-doc-item') && !html.includes('sidebar-doc-link'); } }
      ];

      return tests.map(function(test) {
        try {
          return { name: test.name, ok: !!test.run() };
        } catch (error) {
          return { name: test.name, ok: false, error: error.message };
        }
      });
    }

    function bindNavigation(app) {
      app.querySelectorAll('[data-page]').forEach(function(el) {
        el.addEventListener('click', function() {
          state.page = el.getAttribute('data-page');
          render();
        });
      });

      app.querySelectorAll('[data-action="logout"]').forEach(function(el) {
        el.addEventListener('click', function() {
          state.isAuthenticated = false;
          state.page = 'home';
          render();
        });
      });

      app.querySelectorAll('[data-action="settings"]').forEach(function(el) {
        el.addEventListener('click', function() {
          alert('Раздел настроек пока в разработке.');
        });
      });

      app.querySelectorAll('[data-action="register"]').forEach(function(el) {
        el.addEventListener('click', function() {
          alert('Раздел регистрации пока в разработке.');
        });
      });
    }

    function bindToggles(app) {
      app.querySelectorAll('[data-toggle="faq"]').forEach(function(el) {
        el.addEventListener('click', function() {
          state.faqExpanded = !state.faqExpanded;
          render();
        });
      });

      app.querySelectorAll('[data-toggle="docs"]').forEach(function(el) {
        el.addEventListener('click', function() {
          state.docsExpanded = !state.docsExpanded;
          render();
        });
      });

      app.querySelectorAll('[data-toggle-answer]').forEach(function(el) {
        el.addEventListener('click', function() {
          const answerId = el.getAttribute('data-toggle-answer');
          state.openFaqAnswers[answerId] = !state.openFaqAnswers[answerId];
          render();
        });
      });

      app.querySelectorAll('[data-toggle-alert]').forEach(function(el) {
        el.addEventListener('click', function() {
          const body = document.getElementById(el.getAttribute('data-toggle-alert'));
          if (!body) return;
          const isHidden = body.classList.contains('hidden');
          body.classList.toggle('hidden');
          el.setAttribute('aria-expanded', String(isHidden));
          el.textContent = isHidden ? 'Скрыть подробности' : 'Показать подробности';
        });
      });
    }

    function bindSearch() {
      const faqSearch = document.getElementById('faq-search');
      if (faqSearch) {
        faqSearch.addEventListener('input', function(e) {
          state.faqQuery = e.target.value;
          render();
        });
      }

      const docsSearch = document.getElementById('docs-search');
      if (docsSearch) {
        docsSearch.addEventListener('input', function(e) {
          state.docsQuery = e.target.value;
          render();
        });
      }
    }

    function bindForms() {
      const loginForm = document.getElementById('support-login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          state.isAuthenticated = true;
          state.page = 'cabinet';
          render();
        });
      }
    }

    function render() {
      const app = document.getElementById('app');
      const pages = { home: homePage, news: newsPage, support: supportPage, about: aboutPage, cabinet: cabinetPage, documents: documentsPage, 'support-form': supportFormPage };
      const pageRenderer = pages[state.page] || homePage;
      app.innerHTML = header() + navbar() + pageRenderer() + footer();
      bindNavigation(app);
      bindToggles(app);
      bindSearch();
      bindForms();
    }

    render();
  </script>
</body>
</html>
